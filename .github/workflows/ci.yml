name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate PHP, JavaScript, and shell scripts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: none

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show tool versions
        run: |
          php -v
          node -v

      - name: Validate PHP syntax
        run: |
          find VpnGateway/php -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Validate JavaScript syntax
        run: |
          node --check VpnGateway/php/view/js/dashboard.js

      - name: Validate shell scripts
        run: |
          bash -n VpnGateway/bin/vpnadmin.sh
          bash -n incomingVpnServer/openvpn/up.sh
          sh -n VpnGateway/php/docker-entrypoint.sh
          sh -n incomingVpnServer/openvpn/docker-entrypoint.sh

  security-scan:
    name: CodeQL security scan
    runs-on: ubuntu-latest
    needs: validate

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: php,javascript

      - name: Analyze code
        uses: github/codeql-action/analyze@v3

  docker-build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          mkdir -p ci-artifacts
          : > ci-artifacts/docker-build.log

          gateway_status=0
          openvpn_status=0

          {
            echo '=== Building VPN gateway image ==='
            docker build -f VpnGateway/php/Dockerfile -t securevpn-gateway:ci .
          } >> ci-artifacts/docker-build.log 2>&1 || gateway_status=$?

          {
            echo '=== Building incoming OpenVPN image ==='
            docker build -f incomingVpnServer/openvpn/Dockerfile -t securevpn-openvpn:ci .
          } >> ci-artifacts/docker-build.log 2>&1 || openvpn_status=$?

          if [ "$gateway_status" -ne 0 ] || [ "$openvpn_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload Docker build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-build-log
          path: ci-artifacts/docker-build.log

  dockerfile-lint:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Lint Dockerfiles with hadolint
        run: |
          mkdir -p ci-artifacts
          : > ci-artifacts/hadolint.log

          lint_status=0

          for dockerfile in \
            VpnGateway/php/Dockerfile \
            incomingVpnServer/openvpn/Dockerfile
          do
            {
              echo "=== Linting ${dockerfile} ==="
              docker run --rm -i hadolint/hadolint:latest < "${dockerfile}"
            } >> ci-artifacts/hadolint.log 2>&1 || lint_status=$?
          done

          if [ "$lint_status" -ne 0 ]; then
            exit 1
          fi

      - name: Upload Dockerfile lint log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hadolint-log
          path: ci-artifacts/hadolint.log
